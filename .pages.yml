media:
  input: media
  output: /media

content:
  - name: blog
    label: Blog Posts
    type: collection
    path: blog
    fields:
      - name: title
        label: Title
        type: string

      - name: date
        label: Date
        type: date

      - name: author
        label: Author
        type: string

      - name: body
        label: Body
        type: rich-text

      - name: tags
        label: Tags
        type: list
        field:
          type: string
