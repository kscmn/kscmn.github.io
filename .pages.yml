media:
  input: media
  output: /media

content:
  - name: news_links
    label: News Categories
    type: file
    path: news/links.json
    fields:
      - name: category
        label: Category Name
        type: string

      - name: links
        label: Links
        type: list
        fields:
          - name: title
            label: Title
            type: string
          - name: url
            label: URL
            type: string
          - name: desc
            label: Description
            type: text
