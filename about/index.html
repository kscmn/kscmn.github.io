<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LZD9DR8ZX5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LZD9DR8ZX5');
    </script>

    <title>Sports Card Comps | Kato Sports Cards</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --ebay-blue: #0053a0;         
            --ebay-blue-hover: #004080;
            --ebay-light-grey: #f7f7f7;   
            --ebay-border: #e5e5e5;       
            --ebay-text-main: #191919;    
            --ebay-text-sub: #707070;     
            --radius-standard: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--ebay-light-grey);
            color: var(--ebay-text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
        }

        .logo-area {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .logo-area h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--ebay-text-main);
        }

        .logo-area h1 span {
            color: var(--ebay-blue);
        }

        .feature-box {
            background-color: #ffffff;
            padding: 2.5rem 1.5rem;
            border-radius: var(--radius-standard);
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--ebay-border);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* Breadcrumbs Styling */
        .breadcrumbs {
            font-size: 0.85rem;
            margin-bottom: 20px;
            color: var(--ebay-text-sub);
            text-align: left;
            width: 100%;
        }

        .breadcrumbs a {
            color: var(--ebay-blue);
            text-decoration: none;
        }

        .breadcrumbs a:hover {
            text-decoration: underline;
        }

        /* Search Input Styling */
        .search-input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 16px;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--ebay-blue);
            box-shadow: 0 0 0 1px var(--ebay-blue);
        }

        .cta-button {
            background-color: var(--ebay-blue);
            color: #ffffff !important; /* Force white for visibility */
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            height: 48px;
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            border-radius: 24px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .cta-button:hover {
            background-color: var(--ebay-blue-hover);
        }

        .tip-box {
            margin-top: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--ebay-text-sub);
            text-align: left;
            border-left: 3px solid var(--ebay-border);
        }

        footer {
            padding: 3rem 1rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--ebay-text-sub);
            border-top: 1px solid var(--ebay-border);
            background-color: #ffffff;
            margin-top: auto;
        }

        .footer-copyright {
            color: var(--ebay-text-main);
            font-weight: 600;
            margin-bottom: 0.4rem;
        }
    </style>
</head>
<body>

<main class="hero">
    <header class="logo-area">
        <a href="https://kscmn.com" style="text-decoration: none;">
            <h1>Kato<span> Sports Cards</span></h1>
        </a>
    </header>

    <div class="feature-box">
        <nav class="breadcrumbs">
            <a href="https://kscmn.com">Home</a> &nbsp;/&nbsp; Comps
        </nav>

        <h2 style="margin-bottom: 10px; font-size: 1.8rem;">Card Comps</h2>
        <p style="color: var(--ebay-text-sub); margin-bottom: 25px;">
            Search the eBay market for recent <strong>Sold</strong> prices.
        </p>
        
        <form id="directCompsForm">
            <input type="text" id="cardSearch" class="search-input" placeholder="e.g. 2024 Bowman Elly De La Cruz PSA 10" required>
            <button type="submit" class="cta-button">Search eBay Sold Listings</button>
        </form>

        <div class="tip-box">
            <strong>Tip:</strong> This search is automatically filtered for <strong>Sold & Completed</strong> listings, sorted by <strong>Ended Recently</strong>.
        </div>
    </div>
</main>

<footer>
    <div class="footer-copyright">© 2026 Kato Sports Cards. All Rights Reserved.</div>
    <div class="location-text">Mankato, Minnesota</div>
</footer>

<script>
document.getElementById('directCompsForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const query = document.getElementById('cardSearch').value;
    const ebayUrl = `https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent(query)}&LH_Sold=1&LH_Complete=1&_sop=13`;
    window.open(ebayUrl, '_blank');
});
</script>

</body>
</html>
