            font-weight: 700;

            text-decoration: none;
            color: var(--ebay-text-main);

            padding: 2.5rem 1.5rem;
            border-radius: var(--radius-standard);
            width: 100%;
            max-width: 800px; /* Wider for the table */
            border: 1px solid var(--ebay-border);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);

        .breadcrumbs {

            margin-bottom: 20px;
            color: var(--ebay-text-sub);

            color: var(--ebay-blue);
            text-decoration: none;
        }

        .card-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .card-header h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .tagline {
            color: var(--ebay-text-sub);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* Search Input */
        .search-input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 24px; /* Pill style to match buttons */
            margin-bottom: 25px;
            font-family: inherit;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--ebay-blue);
            box-shadow: 0 0 0 1px var(--ebay-blue);
        }

        /* Table Styling */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }

        thead th {
            background-color: var(--ebay-light-grey);
            padding: 12px 15px;
            font-weight: 700;
            color: var(--ebay-text-main);
            border-bottom: 2px solid var(--ebay-border);
        }

        tbody td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--ebay-border);
        }

        tbody tr:hover {
            background-color: #f9f9f9;
        }

        .date-cell {
            color: var(--ebay-blue);
            font-weight: 700;
            white-space: nowrap;
            width: 100px;
        }

        /* Footer */
        footer {
            padding: 3rem 1rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--ebay-text-sub);
            border-top: 1px solid var(--ebay-border);
            background-color: #ffffff;
            margin-top: auto;

        .footer-copyright {
            color: var(--ebay-text-main);
            font-weight: 600;
            margin-bottom: 0.4rem;

    function filterReleases() {
