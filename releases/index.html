            gap: 12px;
            margin-bottom: 3rem;
            align-items: center; /* Centers buttons in column mode */
        }

        @media (min-width: 520px) {
            .cta-group {

            }

        .cta-button {
            background-color: var(--ebay-blue);
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            height: 48px;
            width: 100%; /* Full width on mobile */
            max-width: 200px; /* Constraints width on desktop */
            display: inline-flex;
            align-items: center;
            justify-content: center; /* Centers text inside button */
            text-align: center;
            padding: 0 20px;
            border-radius: 24px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .cta-button:hover {
            background-color: var(--ebay-blue-hover);
        }

        /* --- Link Group Styles --- */
        .link-group-title {

            font-weight: 700;
            margin-bottom: 1.25rem;

            display: block;
            text-align: center;

            flex-wrap: wrap;
            gap: 8px 16px;
            margin-bottom: 2.5rem;
            justify-content: center; /* Centers the links horizontally */

            text-decoration: none;
            font-size: 0.9rem;
