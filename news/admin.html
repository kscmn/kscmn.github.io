<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>News CMS - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 100%;
            width: 100%;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .auth-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .auth-section.show {
            display: block;
        }

        .auth-section h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }

        .auth-section p {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .auth-section ol {
            margin-left: 20px;
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        .tab-btn {
            padding: 12px 16px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        .tab-content.active {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:active {
            background: #5568d3;
        }

        .btn-secondary {
            background: #eee;
            color: #333;
        }

        .btn-secondary:active {
            background: #ddd;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:active {
            background: #ee5a52;
        }

        .category-group {
            margin-bottom: 20px;
        }

        .category-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .news-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .news-item h3 {
            color: #333;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .news-item p {
            color: #666;
            font-size: 12px;
            margin-bottom: 6px;
            word-break: break-all;
        }

        .news-item-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .news-item-actions button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📰 News CMS</h1>
        <div class="message" id="message"></div>

        <!-- Auth Section -->
        <div class="auth-section" id="authSection">
            <h3>🔐 Setup Required</h3>
            <p><strong>GitHub Personal Access Token not found.</strong></p>
            <p>Follow these steps:</p>
            <ol>
                <li>Go to github.com/settings/tokens</li>
                <li>Click "Generate new token (classic)"</li>
                <li>Name it "News CMS"</li>
                <li>Check "repo" scope</li>
                <li>Generate and copy token</li>
                <li>Paste below:</li>
            </ol>
            <div class="form-group" style="margin-top: 15px;">
                <input type="password" id="tokenInput" placeholder="Paste token here">
            </div>
            <button class="btn-primary" style="width: 100%;" onclick="saveToken()">Save Token</button>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="tabsSection" style="display: none;">
            <button class="tab-btn active" onclick="switchTab('add')">Add News</button>
            <button class="tab-btn" onclick="switchTab('list')">View All</button>
        </div>

        <!-- Add News Tab -->
        <div class="tab-content active" id="add-tab" style="display: none;">
            <form id="newsForm" onsubmit="handleFormSubmit(event)">
                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" required onchange="toggleNewCategory()">
                        <option value="">Select a category...</option>
                    </select>
                </div>

                <div class="form-group" id="newCategoryGroup" style="display: none;">
                    <label for="newCategory">New Category Name</label>
                    <input type="text" id="newCategory" placeholder="Or create new category">
                </div>

                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" required placeholder="Enter news title">
                </div>

                <div class="form-group">
                    <label for="url">URL *</label>
                    <input type="url" id="url" required placeholder="https://example.com">
                </div>

                <div class="form-group">
                    <label for="desc">Description *</label>
                    <input type="text" id="desc" required placeholder="e.g., source name">
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary">✓ Add Link</button>
                    <button type="reset" class="btn-secondary">Clear</button>
                </div>
            </form>
        </div>

        <!-- View All Tab -->
        <div class="tab-content" id="list-tab">
            <div id="newsList" class="loading">Loading news...</div>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'kscmn';
        const REPO_NAME = 'kscmn.github.io';
        const DATA_FILE = 'news/links.json';
        const TOKEN_KEY = 'news_cms_token';

        window.addEventListener('load', () => {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) {
                document.getElementById('authSection').classList.add('show');
            } else {
                initializeApp();
            }
        });

        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                showMessage('Please paste a token', 'error');
                return;
            }
            localStorage.setItem(TOKEN_KEY, token);
            document.getElementById('authSection').classList.remove('show');
            document.getElementById('tabsSection').style.display = 'flex';
            initializeApp();
            showMessage('✅ Token saved!', 'success');
        }

        function initializeApp() {
            document.getElementById('tabsSection').style.display = 'flex';
            document.getElementById('add-tab').style.display = 'block';
            loadCategories();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');

            if (tab === 'list') {
                loadNewsList();
            }
        }

        function toggleNewCategory() {
            const select = document.getElementById('category');
            const group = document.getElementById('newCategoryGroup');
            group.style.display = select.value === '' ? 'block' : 'none';
        }

        async function loadCategories() {
            try {
                const { data } = await fetchNewsData();
                const select = document.getElementById('category');
                
                if (Array.isArray(data)) {
                    data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.category;
                        option.textContent = cat.category;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();

            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) {
                showMessage('Please authenticate first', 'error');
                return;
            }

            const categorySelect = document.getElementById('category').value;
            const newCategory = document.getElementById('newCategory').value.trim();
            const category = newCategory || categorySelect;

            if (!category) {
                showMessage('Please select or enter a category', 'error');
                return;
            }

            const newLink = {
                title: document.getElementById('title').value,
                url: document.getElementById('url').value,
                desc: document.getElementById('desc').value
            };

            try {
                const { data, sha } = await fetchNewsData();
                
                let categoryObj = data.find(cat => cat.category === category);
                if (!categoryObj) {
                    categoryObj = { category, links: [] };
                    data.push(categoryObj);
                }
                
                categoryObj.links.unshift(newLink);
                await saveNewsData(data, sha);
                
                showMessage('✅ Link added!', 'success');
                document.getElementById('newsForm').reset();
            } catch (error) {
                showMessage(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function fetchNewsData() {
            const token = localStorage.getItem(TOKEN_KEY);
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`, {
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || 'Failed to fetch');
            }

            const fileData = await response.json();
            const content = atob(fileData.content);
            return {
                data: JSON.parse(content),
                sha: fileData.sha
            };
        }

        async function saveNewsData(newsData, sha) {
            const token = localStorage.getItem(TOKEN_KEY);
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Update news via CMS',
                    content: btoa(JSON.stringify(newsData, null, 2)),
                    sha: sha
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || 'Failed to save');
            }
        }

        async function loadNewsList() {
            try {
                const { data } = await fetchNewsData();
                const newsList = document.getElementById('newsList');
                
                if (!Array.isArray(data) || data.length === 0) {
                    newsList.innerHTML = '<p class="loading">No news items yet</p>';
                    return;
                }

                let html = '';
                data.forEach(category => {
                    html += `
                        <div class="category-group">
                            <div class="category-title">${escapeHtml(category.category)}</div>
                            <div class="news-list">
                                ${category.links.map((link, idx) => `
                                    <div class="news-item">
                                        <h3>${escapeHtml(link.title)}</h3>
                                        <p><strong>URL:</strong> ${escapeHtml(link.url)}</p>
                                        <p><strong>Source:</strong> ${escapeHtml(link.desc)}</p>
                                        <div class="news-item-actions">
                                            <button class="btn-danger" onclick="deleteLink('${escapeHtml(category.category)}', ${idx})">Delete</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });

                newsList.innerHTML = html;
            } catch (error) {
                document.getElementById('newsList').innerHTML = `<p class="loading" style="color: red;">Error: ${error.message}</p>`;
            }
        }

        async function deleteLink(category, index) {
            if (!confirm('Delete this link?')) return;

            try {
                const { data, sha } = await fetchNewsData();
                const categoryObj = data.find(cat => cat.category === category);
                
                if (categoryObj) {
                    categoryObj.links.splice(index, 1);
                    if (categoryObj.links.length === 0) {
                        const idx = data.findIndex(cat => cat.category === category);
                        data.splice(idx, 1);
                    }
                    
                    await saveNewsData(data, sha);
                    showMessage('✅ Deleted!', 'success');
                    loadNewsList();
                }
            } catch (error) {
                showMessage(`❌ Error: ${error.message}`, 'error');
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            setTimeout(() => {
                msg.className = 'message';
            }, 4000);
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
