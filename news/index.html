<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSC | News</title>

    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #3b82f6;
            --border-color: #e2e8f0;
            --shadow: 0 2px 6px rgba(0,0,0,0.08);
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            max-width: 600px;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .category-section h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--accent-color);
            margin-bottom: 12px;
            padding-left: 4px;
            border-left: 3px solid var(--accent-color);
        }

        .links-grid {
            display: grid;
            gap: 10px;
        }

        .link-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 14px 18px;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
            border-color: var(--accent-color);
        }

        .info h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .arrow {
            opacity: 0.4;
            transition: var(--transition);
        }

        .link-card:hover .arrow {
            opacity: 1;
            transform: translateX(3px);
        }

        footer {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>News</h1>
    </header>

    <div class="container" id="news-container"></div>

    <footer>
        KSC. Kato Sports Cards
    </footer>

    <script>
    async function loadNews() {
        try {
            const res = await fetch("links.json?cache=" + Date.now());
            if (!res.ok) throw new Error("Failed to load links.json");

            const categories = await res.json();
            const container = document.getElementById("news-container");

            categories.forEach(cat => {
                const section = document.createElement("section");
                section.className = "category-section";

                section.innerHTML = `
                    <h2>${cat.category}</h2>
                    <div class="links-grid">
                        ${cat.links.map(link => `
                            <a href="${link.url}" class="link-card" target="_blank">
                                <div class="info">
                                    <h3>${link.title}</h3>
                                    <p>${link.desc}</p>
                                </div>
                                <div class="arrow">→</div>
                            </a>
                        `).join("")}
                    </div>
                `;

                container.appendChild(section);
            });

        } catch (err) {
            console.error("Error loading news:", err);
        }
    }

    loadNews();
    </script>

</body>
</html>
